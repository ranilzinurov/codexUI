# Narrow browser-annotation ingress for Codex UI.
# Replace upstream/certificate paths if the backend or Certbot layout differs.
map $http_upgrade $annotation_connection_upgrade {
    default upgrade;
    ''      close;
}

upstream codex_annotation_backend {
    server 127.0.0.1:4173;
    keepalive 16;
}

server {
    listen 46.62.215.111:80;
    server_name annotate.todo-tg-app.ru;

    access_log /var/log/nginx/annotate.todo-tg-app.ru.access.log;
    error_log /var/log/nginx/annotate.todo-tg-app.ru.error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://annotate.todo-tg-app.ru$request_uri;
    }
}

server {
    listen 46.62.215.111:443 ssl http2;
    server_name annotate.todo-tg-app.ru;

    access_log /var/log/nginx/annotate.todo-tg-app.ru.ssl.access.log;
    error_log /var/log/nginx/annotate.todo-tg-app.ru.ssl.error.log;

    ssl_certificate /etc/letsencrypt/live/annotate.todo-tg-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/annotate.todo-tg-app.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    add_header Strict-Transport-Security "max-age=300" always;

    client_max_body_size 50m;
    keepalive_timeout 65;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;
    gzip_proxied any;

    location = /browser-annotation-test.html {
        proxy_pass http://codex_annotation_backend;
        proxy_http_version 1.1;
        # Vite rejects unknown Host values; keep the public host in X-Forwarded-Host.
        proxy_set_header Host 127.0.0.1:4173;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location ^~ /codex-api/extension/ {
        proxy_pass http://codex_annotation_backend;
        proxy_http_version 1.1;
        # Vite rejects unknown Host values; keep the public host in X-Forwarded-Host.
        proxy_set_header Host 127.0.0.1:4173;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $annotation_connection_upgrade;
        proxy_request_buffering on;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        return 404;
    }
}
