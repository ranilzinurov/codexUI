# Concrete hosted deployment example for codexUI.
# Replace the listen address, server_name, log paths, and certificate paths before reuse.
map $http_upgrade $codex_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 49.13.80.135:80;
    server_name codex.todo-tg-app.ru;

    access_log /var/log/nginx/codex.todo-tg-app.ru.access.log;
    error_log /var/log/nginx/codex.todo-tg-app.ru.error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://codex.todo-tg-app.ru$request_uri;
    }
}

server {
    listen 49.13.80.135:443 ssl http2;
    server_name codex.todo-tg-app.ru;

    access_log /var/log/nginx/codex.todo-tg-app.ru.ssl.access.log;
    error_log /var/log/nginx/codex.todo-tg-app.ru.ssl.error.log;

    ssl_certificate /etc/letsencrypt/live/codex.todo-tg-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codex.todo-tg-app.ru/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    add_header Strict-Transport-Security "max-age=300" always;

    client_max_body_size 30m;

    # Performance: keep connections alive for mobile multiplexing
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Gzip for text assets — critical on mobile networks
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json;
    gzip_min_length 256;
    gzip_proxied any;

    # Efficient static file serving
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    root /var/www/codexui-dist;

    # Static assets — served directly by nginx, NOT proxied to node
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /icons/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /manifest.webmanifest {
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /apple-touch-icon.png {
        try_files /icons/apple-touch-icon.png =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /apple-touch-icon-precomposed.png {
        try_files /icons/apple-touch-icon.png =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /favicon.ico {
        return 204;
    }

    location = /codex-api/ws {
        proxy_pass http://127.0.0.1:5901;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $codex_connection_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location ^~ /codex-api/ {
        proxy_pass http://127.0.0.1:5901;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location / {
        proxy_pass http://127.0.0.1:5901;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $codex_connection_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}

