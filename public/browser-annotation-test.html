<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Annotation Extension Test Page</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px;
        line-height: 1.5;
      }

      button,
      input {
        min-height: 36px;
        border-radius: 6px;
        border: 1px solid CanvasText;
        padding: 6px 10px;
        font: inherit;
      }

      .sample-card {
        border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
        border-radius: 8px;
        padding: 18px;
        margin-top: 20px;
      }

      .sample-card button {
        background: #15803d;
        border-color: #166534;
        color: white;
        cursor: pointer;
      }

      .sample-card button:hover {
        background: #166534;
      }

      .sample-card button:active {
        background: #14532d;
      }
    </style>
  </head>
  <body>
    <h1>Codex annotation extension test page</h1>
    <p>This public page is safe for testing side-panel overlay injection and element selection.</p>
    <label>
      Sample input
      <input id="sample-input" value="Annotate me later">
    </label>
    <div class="sample-card">
      <h2>Sample card</h2>
      <p>Use this card to test element selection, screenshots, and queue behavior.</p>
      <button type="button">Sample action</button>
    </div>
  </body>
</html>
